<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--bg4:#1e1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0eff5;--muted:#7a7990;--muted2:#4a4960;
  --accent:#4f6ef7;--green:#2dcc7e;--yellow:#f5c842;--red:#f05252;
  --mono:'IBM Plex Mono',monospace;--sans:'Barlow',system-ui,sans-serif;
  --header-h:60px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;padding:0 0 80px}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:var(--header-h);position:sticky;top:0;z-index:200}
.logo{font-family:var(--mono);font-weight:600;font-size:15px;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.api-remaining{font-family:var(--mono);font-size:11px;color:var(--muted);padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px}
.refresh-btn{background:var(--accent);border:none;color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.05em;padding:7px 16px;border-radius:5px;cursor:pointer;text-transform:uppercase}
.refresh-btn:hover{opacity:.85}.refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.sport-tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto}
.sport-tab{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:14px 18px;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap}
.sport-tab:hover{color:var(--text)}.sport-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.controls{padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2)}
.ctrl-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.ctrl-sel,.ctrl-inp{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:13px;padding:6px 10px;border-radius:5px;outline:none}
.ctrl-inp{width:80px;font-family:var(--mono)}
.search-wrap{position:relative}
.search-inp{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:13px;padding:6px 12px 6px 30px;border-radius:5px;outline:none;width:220px}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.stats-pill{margin-left:auto;display:flex;gap:16px}
.stat-item{display:flex;flex-direction:column;align-items:flex-end}
.stat-val{font-family:var(--mono);font-size:16px;font-weight:600;line-height:1}
.stat-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.status-bar{padding:8px 24px;font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted2);flex-shrink:0}
.sdot.live{background:var(--green);animation:pulse 1.5s ease-in-out infinite}
.sdot.loading{background:var(--yellow);animation:pulse .8s ease-in-out infinite}
.sdot.error{background:var(--red)}
.table-wrap{padding:0 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1100px}
thead tr{border-bottom:1px solid var(--border2)}
th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 12px;text-align:left;white-space:nowrap;background:var(--bg)}
th.r{text-align:right}th.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg2)}
tbody tr.has-edge{background:rgba(45,204,126,.03)}
tbody tr.collapsed-row{display:none}
td{padding:10px 12px;vertical-align:middle;font-size:13px}
td.r{text-align:right}td.c{text-align:center}
.mkt-badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;background:var(--bg4);border:1px solid var(--border2);color:var(--muted)}
.odds-pos{color:#6ee7b7;font-family:var(--mono);font-weight:600}
.odds-neg{color:var(--text);font-family:var(--mono);font-weight:600}
.cell-inp{width:58px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 6px;border-radius:4px;outline:none;text-align:right}
.cell-inp:focus{border-color:var(--accent)}
.cell-inp.filled{border-color:rgba(79,110,247,.5);background:rgba(79,110,247,.05)}
.cell-inp.line-changed{border-color:rgba(245,200,66,.5);background:rgba(245,200,66,.04)}
.pred-unit{font-size:11px;color:var(--muted);font-family:var(--mono)}
.edge-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.edge-bar-bg{width:50px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0}
.edge-bar-fill{height:100%;border-radius:2px}
.edge-val{font-family:var(--mono);font-size:13px;font-weight:600;min-width:52px;text-align:right}
.e-none{color:var(--muted2)}.e-strong{color:var(--green)}.e-med{color:#7ddfab}.e-weak{color:var(--yellow)}.e-neg{color:var(--red)}
.u-pass{color:var(--muted2);font-family:var(--mono);font-size:12px}
.u-val{font-family:var(--mono);font-weight:600;color:var(--green)}
.bet-val{font-family:var(--mono);font-size:13px;font-weight:600}
.state-row td{padding:60px 0;text-align:center;color:var(--muted)}
/* GAME HEADER */
.ghrow{background:var(--bg3)!important;cursor:pointer;border-top:2px solid var(--bg)!important}
.ghrow:hover{background:var(--bg4)!important}
.ghrow td{padding:7px 12px}
.gh-inner{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.gh-stripe{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.gh-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;background:var(--bg4);border:1px solid var(--border2);color:var(--muted)}
.gh-badge.urgent{color:var(--red);border-color:rgba(240,82,82,.3);background:rgba(240,82,82,.08)}
.gh-badge.soon{color:var(--yellow);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.08)}
.gh-arrow{margin-left:auto;font-size:12px;color:var(--muted2);transition:transform .2s}
.gh-arrow.up{transform:rotate(-180deg)}
/* GATE */
.gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.gate-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:40px;display:flex;flex-direction:column;align-items:center;gap:20px;min-width:320px}
.gate-logo{font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.gate-inp{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:14px;padding:10px 16px;border-radius:6px;outline:none;width:100%;text-align:center}
.gate-inp:focus{border-color:var(--accent)}
.gate-btn{background:var(--accent);border:none;color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;padding:10px 32px;border-radius:6px;cursor:pointer;width:100%;text-transform:uppercase}
.gate-btn:hover{opacity:.85}
.gate-err{color:var(--red);font-family:var(--mono);font-size:12px;display:none}

::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-logo"><span class="logo-dot"></span>EDGE DASHBOARD</div>
    <input class="gate-inp" id="gate-inp" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPass()">
    <button class="gate-btn" onclick="checkPass()">Enter</button>
    <span class="gate-err" id="gate-err">Incorrect password</span>
  </div>
</div>

<header class="header">
  <div class="logo"><span class="logo-dot"></span>EDGE DASHBOARD</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="api-remaining" id="api-remaining">-- requests left</div>
    <button class="refresh-btn" id="collapse-btn" onclick="toggleAll()" style="background:var(--bg3);border:1px solid var(--border2);color:var(--muted)">Collapse All</button>
    <button class="refresh-btn" id="refresh-btn" onclick="loadOdds()">Refresh</button>
  </div>
</header>

<nav class="sport-tabs" id="sport-tabs"></nav>

<div class="controls">
  <div class="search-wrap">
    <span class="search-ico">&#9906;</span>
    <input class="search-inp" id="search" placeholder="Search team or matchup..." oninput="renderTable()">
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="ctrl-lbl">Market</span>
    <select class="ctrl-sel" id="mkt-filter" onchange="loadOdds()">
      <option value="ALL">All (3 credits)</option>
      <option value="ML">Moneyline (1 credit)</option>
      <option value="Spread">Spread (1 credit)</option>
      <option value="Total">Total (1 credit)</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="ctrl-lbl">Unit $</span>
    <input class="ctrl-inp" id="unit-size" type="number" value="300" min="1" step="1" oninput="renderTable()">
  </div>
  <div class="stats-pill">
    <div class="stat-item"><span class="stat-val" id="stat-lines">0</span><span class="stat-lbl">Lines</span></div>
    <div class="stat-item"><span class="stat-val" id="stat-edges">0</span><span class="stat-lbl">Edges</span></div>
  </div>
</div>

<div class="status-bar">
  <span class="sdot" id="sdot"></span>
  <span id="status-txt">Loading...</span>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th>Game</th>
        <th>Mkt</th>
        <th>Side</th>
        <th>Consensus Line</th>
        <th class="r">Consensus</th>
        <th class="r">No-Vig %</th>
        <th class="c">Your Line</th>
        <th class="r">Adj. Fair %</th>
        <th class="c">Mkt Price %</th>
        <th class="r">Edge</th>
        <th class="r">Units</th>
        <th class="r">Bet Size</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
var SPORTS=[{key:'basketball_nba',label:'NBA'},{key:'basketball_ncaab',label:'NCAAB'},{key:'icehockey_nhl',label:'NHL'},{key:'baseball_mlb',label:'MLB'},{key:'mma_mixed_martial_arts',label:'UFC/MMA'}];
var MARKET_KEYS={ML:'h2h',Spread:'spreads',Total:'totals'};
var COLORS=['#4f6ef7','#2dcc7e','#f5c842','#f05252','#a78bfa','#38bdf8','#fb923c','#e879f9','#34d399','#f87171','#60a5fa','#fbbf24','#a3e635','#c084fc','#fb7185','#22d3ee'];
var currentSport='basketball_nba';
var rawRows=[];
var preds={};
var yourLines={};
var collapsed={};

function checkPass(){
  var inp=document.getElementById('gate-inp');
  if(inp.value==='realoddmoe24'){
    document.getElementById('gate').style.display='none';
    sessionStorage.setItem('auth','1');
    loadOdds();
  } else {
    document.getElementById('gate-err').style.display='block';
    inp.value='';inp.focus();
  }
}

function imp(n){n=Number(n);if(!isFinite(n))return null;return n<0?Math.abs(n)/(Math.abs(n)+100):100/(n+100);}
function novig(a,b){if(a==null||b==null)return{fa:null,fb:null};var t=a+b;if(!isFinite(t)||t<=0)return{fa:null,fb:null};return{fa:a/t,fb:b/t};}
function mktLbl(m){return m==='h2h'?'ML':m==='spreads'?'Spread':m==='totals'?'Total':m;}
function fmtAm(n){n=Number(n);return!isFinite(n)?'-':n>=0?'+'+n:''+n;}
function units(e){if(e==null||!isFinite(e))return 0;if(e>=12)return 3;if(e>=8)return 2;if(e>=5)return 1;if(e>=3)return 0.5;return 0;}
function adjFair(fair,fd,yl,mkt,ps){
  if(fair==null||mkt==='ML')return fair;
  if(fd==null||yl==null||yl==='')return fair;
  var d=parseFloat(yl)-parseFloat(fd);
  if(!isFinite(d)||d===0)return fair;
  d=Math.max(Math.min(d,10),-10);
  var adj=(d/0.5)*0.03;
  if(mkt==='Total'){
    // For Over: higher line = harder = fair goes DOWN
    // For Under: higher line = easier = fair goes UP
    // ps='A' is always Over, ps='B' is always Under
    adj = ps==='A' ? -adj : adj;
  }
  // For Spread: more points = better for that side = fair goes UP
  return Math.min(Math.max(fair+adj,0.01),0.99);
}
function timeInfo(c){
  if(!c)return{lbl:'TBD',cls:''};
  var m=(c-new Date())/60000;
  if(m<-120)return{lbl:'LIVE',cls:'urgent'};
  if(m<0)return{lbl:Math.round(-m)+'m ago',cls:'urgent'};
  if(m<120)return{lbl:Math.round(m)+'m',cls:'urgent'};
  if(m<360)return{lbl:(Math.round(m/6)/10)+'h',cls:'soon'};
  var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  var tzShort=c.toLocaleTimeString('en-US',{timeZoneName:'short',hour:'numeric',minute:'2-digit'}).split(' ').pop();
  return{lbl:c.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+c.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+' '+tzShort,cls:''};
}
function getFair(r){
  var pairs={};
  rawRows.forEach(function(x){if(!pairs[x.pid])pairs[x.pid]={};pairs[x.pid][x.ps]=x;});
  var p=pairs[r.pid]||{};
  var nv=novig(p.A?imp(p.A.am):null,p.B?imp(p.B.am):null);
  return r.ps==='A'?nv.fa:nv.fb;
}

function toggleAll(){
  var btn=document.getElementById('collapse-btn');
  var allCollapsed=Object.keys(collapsed).length>0&&Object.values(collapsed).every(function(v){return v;});
  if(allCollapsed){
    // expand all
    Object.keys(collapsed).forEach(function(k){collapsed[k]=false;});
    document.querySelectorAll('tr[data-gk]:not(.ghrow)').forEach(function(tr){tr.classList.remove('collapsed-row');});
    document.querySelectorAll('.gh-arrow').forEach(function(el){el.classList.add('up');});
    btn.textContent='Collapse All';
  } else {
    // collapse all
    var gOrder=[];
    document.querySelectorAll('tr.ghrow').forEach(function(tr){
      var gk=tr.getAttribute('data-gk');
      if(gk&&gOrder.indexOf(gk)===-1)gOrder.push(gk);
    });
    gOrder.forEach(function(k){collapsed[k]=true;});
    document.querySelectorAll('tr[data-gk]:not(.ghrow)').forEach(function(tr){tr.classList.add('collapsed-row');});
    document.querySelectorAll('.gh-arrow').forEach(function(el){el.classList.remove('up');});
    btn.textContent='Expand All';
  }
}

function buildTabs(){
  var nav=document.getElementById('sport-tabs');nav.innerHTML='';
  SPORTS.forEach(function(s){
    var b=document.createElement('button');
    b.className='sport-tab'+(s.key===currentSport?' active':'');
    b.textContent=s.label;b.setAttribute('data-key',s.key);
    b.onclick=function(){
      currentSport=s.key;
      document.querySelectorAll('.sport-tab').forEach(function(x){x.classList.toggle('active',x.getAttribute('data-key')===s.key);});
      loadOdds();
    };
    nav.appendChild(b);
  });
}

function parseGames(games){
  var rows=[];
  games.forEach(function(g){
    var books=g.bookmakers||[];if(!books.length)return;
    var mkts={};books.forEach(function(b){(b.markets||[]).forEach(function(m){mkts[m.key]=true;});});
    Object.keys(mkts).forEach(function(mk){
      var oA=[],oB=[],pA=[],pB=[],nA=null,nB=null;
      books.forEach(function(b){
        var m=(b.markets||[]).find(function(x){return x.key===mk;});
        if(!m||!m.outcomes||m.outcomes.length!==2)return;
        var A=m.outcomes[0],B=m.outcomes[1];
        if(!nA){nA=A.name;nB=B.name;}
        oA.push(A.price);oB.push(B.price);
        if(A.point!=null)pA.push(A.point);
        if(B.point!=null)pB.push(B.point);
      });
      if(!oA.length)return;
      // Fix: only average odds from books that have matching lines
      // to avoid mixing odds from different spread/total numbers
      function amToDecimal(a){return a>=0?(a/100)+1:(100/Math.abs(a))+1;}
      function decimalToAm(d){return d>=2?Math.round((d-1)*100):Math.round(-100/(d-1));}

      // Find most common line for side A
      if(pA.length>0){
        var lineCountA={};
        pA.forEach(function(p){var k=Math.round(p*2)/2;lineCountA[k]=(lineCountA[k]||0)+1;});
        var modeLineA=parseFloat(Object.keys(lineCountA).reduce(function(a,b){return lineCountA[a]>lineCountA[b]?a:b;}));
        // only use odds from books where lineA matches mode
        var filtOA=[],filtOB=[];
        books.forEach(function(b){
          var m=(b.markets||[]).find(function(x){return x.key===mk;});
          if(!m||!m.outcomes||m.outcomes.length!==2)return;
          var A=m.outcomes[0],B=m.outcomes[1];
          if(A.point!=null&&Math.round(A.point*2)/2===modeLineA){
            filtOA.push(A.price);filtOB.push(B.price);
          }
        });
        if(filtOA.length){oA=filtOA;oB=filtOB;}
      }

      var avgDecA=oA.map(amToDecimal).reduce(function(s,v){return s+v;},0)/oA.length;
      var avgDecB=oB.map(amToDecimal).reduce(function(s,v){return s+v;},0)/oB.length;
      var avgA=decimalToAm(avgDecA);
      var avgB=decimalToAm(avgDecB);
      var ptA=pA.length?pA.reduce(function(s,v){return s+v;},0)/pA.length:null;
      var ptB=pB.length?pB.reduce(function(s,v){return s+v;},0)/pB.length:null;
      var lbl=mktLbl(mk);
      var gs=g.away_team+' @ '+g.home_team;
      var cm=g.commence_time?new Date(g.commence_time):null;
      var pid=g.id+'-'+mk;
      rows.push({id:pid+'-A',game:gs,cm:cm,mkt:lbl,side:nA,am:Math.round(avgA),pt:ptA!=null?Math.round(ptA*2)/2:null,pid:pid,ps:'A'});
      rows.push({id:pid+'-B',game:gs,cm:cm,mkt:lbl,side:nB,am:Math.round(avgB),pt:ptB!=null?Math.round(ptB*2)/2:null,pid:pid,ps:'B'});
    });
  });
  return rows;
}

function loadOdds(){
  var btn=document.getElementById('refresh-btn'),dot=document.getElementById('sdot'),stxt=document.getElementById('status-txt');
  var sp=SPORTS.find(function(s){return s.key===currentSport;});
  var lbl=sp?sp.label:currentSport;
  btn.disabled=true;dot.className='sdot loading';stxt.textContent='Fetching '+lbl+'...';
  document.getElementById('tbody').innerHTML='<tr class="state-row"><td colspan="12">Loading...</td></tr>';
  var sel=document.getElementById('mkt-filter').value;
  var mkts=currentSport==='mma_mixed_martial_arts'?'h2h':sel==='ALL'?'h2h,spreads,totals':(MARKET_KEYS[sel]||'h2h');
  fetch('/api/odds?sport='+currentSport+'&markets='+mkts+'&bookmakers=fanduel,draftkings,betmgm,caesars')
    .then(function(r){var rem=r.headers.get('x-requests-remaining');if(rem)document.getElementById('api-remaining').textContent=rem+' requests left';return r.json();})
    .then(function(d){
      if(Array.isArray(d)){
        rawRows=parseGames(d);
        var now=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit',second:'2-digit'});
        if(rawRows.length){dot.className='sdot live';stxt.textContent='Updated '+now+' - '+(rawRows.length/2|0)+' games - Consensus';}
        else{dot.className='sdot error';stxt.textContent='No '+lbl+' games right now';}
      }else{rawRows=[];dot.className='sdot error';stxt.textContent='API error';}
    })
    .catch(function(e){rawRows=[];dot.className='sdot error';stxt.textContent='Error: '+e.message;})
    .then(function(){btn.disabled=false;renderTable();});
}

function toggleGame(gk){
  collapsed[gk]=!collapsed[gk];
  var isC=collapsed[gk];
  document.querySelectorAll('tr[data-gk]').forEach(function(tr){
    if(tr.getAttribute('data-gk')===gk&&!tr.classList.contains('ghrow')){
      tr.classList.toggle('collapsed-row',isC);
    }
  });
  document.querySelectorAll('.gh-arrow[data-gk="'+gk+'"]').forEach(function(el){el.classList.toggle('up',!isC);});
}

function renderTable(){
  var unit=parseFloat(document.getElementById('unit-size').value)||300;
  var q=document.getElementById('search').value.trim().toLowerCase();
  if(!rawRows.length){
    document.getElementById('tbody').innerHTML='<tr class="state-row"><td colspan="12">No odds - hit Refresh</td></tr>';
    document.getElementById('stat-lines').textContent='0';
    document.getElementById('stat-edges').textContent='0';
    return;
  }
  var pairs={};
  rawRows.forEach(function(r){if(!pairs[r.pid])pairs[r.pid]={};pairs[r.pid][r.ps]=r;});
  var rows=rawRows.map(function(r){
    var p=pairs[r.pid]||{};
    var nv=novig(p.A?imp(p.A.am):null,p.B?imp(p.B.am):null);
    var fair=r.ps==='A'?nv.fa:nv.fb;
    var yl=yourLines[r.id]!=null?yourLines[r.id]:null;
    var af=adjFair(fair,r.pt,yl,r.mkt,r.ps);
    var pr=preds[r.id];
    var pred=(pr!==undefined&&pr!=='')?parseFloat(pr)/100:null;
    var edge=(af!=null&&pred!=null&&isFinite(pred))?(af-pred)*100:null;
    var u=units(edge);
    return{id:r.id,game:r.game,cm:r.cm,mkt:r.mkt,side:r.side,am:r.am,pt:r.pt,ps:r.ps,pid:r.pid,fair:fair,af:af,yl:yl,edge:edge,u:u,bet:u*unit};
  });
  var filtered=rows.filter(function(r){
    if(!q)return true;
    return(r.game+' '+r.side+' '+r.mkt).toLowerCase().indexOf(q)!==-1;
  });
  // sort by game time then market order
  var mO={ML:0,Spread:1,Total:2};
  filtered.sort(function(a,b){
    var ta=a.cm?a.cm.getTime():9e12,tb=b.cm?b.cm.getTime():9e12;
    if(a.game!==b.game)return ta-tb;
    if(a.mkt!==b.mkt)return(mO[a.mkt]||0)-(mO[b.mkt]||0);
    return 0;
  });
  var ec=filtered.filter(function(r){return r.edge!=null&&r.edge>0;}).length;
  document.getElementById('stat-lines').textContent=filtered.length;
  document.getElementById('stat-edges').textContent=ec;
  if(!filtered.length){document.getElementById('tbody').innerHTML='<tr class="state-row"><td colspan="12">No results</td></tr>';return;}
  // build color map
  var gOrder=[],gSeen={};
  filtered.forEach(function(r){if(!gSeen[r.game]){gSeen[r.game]=true;gOrder.push(r.game);}});
  var gColor={},gCm={};
  gOrder.forEach(function(g,i){
    gColor[g]=COLORS[i%COLORS.length];
    var row=filtered.find(function(r){return r.game===g;});
    gCm[g]=row?row.cm:null;
  });
  var html='',lastG=null;
  filtered.forEach(function(r){
    var color=gColor[r.game];
    var isC=!!collapsed[r.game];
    if(r.game!==lastG){
      lastG=r.game;
      var ti=timeInfo(gCm[r.game]);
      var teams=r.game.split(' @ ');
      // escape game key for use in onclick
      var gk=r.game.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+='<tr class="ghrow" data-gk="'+r.game.replace(/"/g,'&quot;')+'" onclick="toggleGame(\''+gk+'\')">'
        +'<td colspan="12"><div class="gh-inner">'
        +'<div class="gh-stripe" style="background:'+color+'"></div>'
        +'<span>'+teams[0]+'</span><span style="color:var(--muted2)">@</span><span>'+(teams[1]||'')+'</span>'
        +(ti.lbl?'<span class="gh-badge '+ti.cls+'">'+ti.lbl+'</span>':'')
        +'<span class="gh-arrow'+(isC?'':' up')+'" data-gk="'+r.game.replace(/"/g,'&quot;')+'">&#9660;</span>'
        +'</div></td></tr>';
    }
    html+=buildRow(r,color,isC);
  });
  document.getElementById('tbody').innerHTML=html;
}

function buildRow(r,color,isC){
  var am=fmtAm(r.am);
  var aCls=Number(r.am)>=0?'odds-pos':'odds-neg';
  var lineStr='-';
  if(r.pt!=null)lineStr=r.mkt==='Total'?(r.ps==='A'?'O ':'U ')+Math.abs(r.pt):(r.pt>=0?'+'+r.pt:''+r.pt);
  var fairStr=r.fair!=null?(r.fair*100).toFixed(1)+'%':'-';
  var afStr=r.af!=null?(r.af*100).toFixed(1)+'%':'-';
  var afChanged=(r.yl!=null&&r.pt!=null&&parseFloat(r.yl)!==parseFloat(r.pt));
  var es='-',ec='e-none',bw=0,bc='var(--muted2)';
  if(r.edge!=null){
    es=(r.edge>0?'+':'')+r.edge.toFixed(1)+'%';
    if(r.edge>=8){ec='e-strong';bc='var(--green)';}
    else if(r.edge>=5){ec='e-med';bc='#7ddfab';}
    else if(r.edge>0){ec='e-weak';bc='var(--yellow)';}
    else{ec='e-neg';bc='var(--red)';}
    bw=Math.min(Math.abs(r.edge)*5,50);
  }
  var uH=r.u===0?'<span class="u-pass">PASS</span>':'<span class="u-val">'+r.u+'u</span>';
  var bH=r.u===0?'<span class="u-pass">-</span>':'<span class="bet-val">$'+r.bet.toFixed(0)+'</span>';
  var pv=preds[r.id]||'';
  var ylv=r.yl!=null?r.yl:'';
  var ph=r.pt!=null?r.pt:'';
  var lc=afChanged?' line-changed':'';
  var ylCell=r.mkt==='ML'
    ?'<td class="c" data-label="Your Line"></td>'
    :'<td class="c" data-label="Your Line"><input class="cell-inp'+lc+'" type="number" step="0.5" placeholder="'+ph+'" value="'+ylv+'" data-id="'+r.id+'" onblur="setLine(this)" onkeydown="if(event.key===\'Enter\')this.blur()"></td>';
  var gk=r.game.replace(/"/g,'&quot;');
  return '<tr class="'+(r.edge!=null&&r.edge>0?'has-edge':'')+(isC?' collapsed-row':'')+'" data-gk="'+gk+'" style="border-left:3px solid '+color+'">'
    +'<td class="game-td" data-label="Game"><div style="font-weight:600">'+r.side+'</div><div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px">'+r.game+'</div></td>'
    +'<td data-label="Market"><span class="mkt-badge">'+r.mkt+'</span></td>'
    +'<td data-label="Side" style="color:var(--muted);font-size:12px">'+r.side+'</td>'
    +'<td data-label="Cons. Line" style="font-family:var(--mono);color:var(--muted);font-size:12px">'+lineStr+'</td>'
    +'<td class="r" data-label="Consensus"><span class="'+aCls+'">'+am+'</span></td>'
    +'<td class="r" data-label="No-Vig %" style="font-family:var(--mono);color:var(--muted)">'+fairStr+'</td>'
    +ylCell
    +'<td class="r" data-label="Adj. Fair %" style="font-family:var(--mono);color:'+(afChanged?'var(--yellow)':'var(--muted)')+'">'+afStr+'</td>'
    +'<td class="c" data-label="Mkt Price %"><div style="display:flex;align-items:center;gap:4px;justify-content:center"><input class="cell-inp'+(pv?' filled':'')+'" type="number" min="1" max="99" step="0.5" placeholder="-" value="'+pv+'" data-id="'+r.id+'" onblur="setPred(this)" onkeydown="if(event.key===\'Enter\')this.blur()"><span class="pred-unit">%</span></div></td>'
    +'<td class="r" data-label="Edge"><div class="edge-wrap"><div class="edge-bar-bg"><div class="edge-bar-fill" style="width:'+bw+'px;background:'+bc+'"></div></div><span class="edge-val '+ec+'">'+es+'</span></div></td>'
    +'<td class="r" data-label="Units">'+uH+'</td>'
    +'<td class="r" data-label="Bet">'+bH+'</td>'
    +'</tr>';
}

function setLine(input){
  var id=input.getAttribute('data-id');
  yourLines[id]=input.value!==''?parseFloat(input.value):null;
  input.classList.toggle('line-changed',yourLines[id]!=null);
  var tr=input.closest('tr');if(!tr)return;
  var r=rawRows.find(function(x){return x.id===id;});if(!r)return;
  var fair=getFair(r);
  var af=adjFair(fair,r.pt,yourLines[id],r.mkt,r.ps);
  var changed=(yourLines[id]!=null&&r.pt!=null&&parseFloat(yourLines[id])!==parseFloat(r.pt));
  var tds=tr.querySelectorAll('td');
  // col 7 = Adj. Fair (0-indexed: Game=0,Mkt=1,Side=2,FDLine=3,Consensus=4,NoVig=5,YourLine=6,AdjFair=7)
  tds[7].textContent=af!=null?(af*100).toFixed(1)+'%':'-';
  tds[7].style.cssText='text-align:right;font-family:var(--mono);color:'+(changed?'var(--yellow)':'var(--muted)');
  var inputs=tr.querySelectorAll('input[data-id="'+id+'"]');
  if(inputs.length>1)setPred(inputs[inputs.length-1]);
}

function setPred(input){
  var id=input.getAttribute('data-id');
  preds[id]=input.value;
  input.classList.toggle('filled',!!input.value);
  var tr=input.closest('tr');if(!tr)return;
  var r=rawRows.find(function(x){return x.id===id;});if(!r)return;
  var fair=getFair(r);
  var yl=yourLines[id]!=null?yourLines[id]:null;
  var af=adjFair(fair,r.pt,yl,r.mkt,r.ps);
  var pred=input.value!==''?parseFloat(input.value)/100:null;
  var edge=(af!=null&&pred!=null&&isFinite(pred))?(af-pred)*100:null;
  var u=units(edge);
  var unit=parseFloat(document.getElementById('unit-size').value)||300;
  var es='-',ec='e-none',bw=0,bc='var(--muted2)';
  if(edge!=null){
    es=(edge>0?'+':'')+edge.toFixed(1)+'%';
    if(edge>=8){ec='e-strong';bc='var(--green)';}
    else if(edge>=5){ec='e-med';bc='#7ddfab';}
    else if(edge>0){ec='e-weak';bc='var(--yellow)';}
    else{ec='e-neg';bc='var(--red)';}
    bw=Math.min(Math.abs(edge)*5,50);
  }
  var tds=tr.querySelectorAll('td');
  // col indices: Edge=9, Units=10, Bet=11
  tds[9].innerHTML='<div class="edge-wrap"><div class="edge-bar-bg"><div class="edge-bar-fill" style="width:'+bw+'px;background:'+bc+'"></div></div><span class="edge-val '+ec+'">'+es+'</span></div>';
  tds[10].innerHTML=u===0?'<span class="u-pass">PASS</span>':'<span class="u-val">'+u+'u</span>';
  tds[11].innerHTML=u===0?'<span class="u-pass">-</span>':'<span class="bet-val">$'+(u*unit).toFixed(0)+'</span>';
  tr.classList.toggle('has-edge',edge!=null&&edge>0);
  document.getElementById('stat-edges').textContent=document.querySelectorAll('tr.has-edge').length;
}

buildTabs();
if(sessionStorage.getItem('auth')==='1'){document.getElementById('gate').style.display='none';loadOdds();}
</script>
