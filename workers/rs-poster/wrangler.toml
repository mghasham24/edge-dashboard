# workers/rs-poster/wrangler.toml
# Deploy this worker separately from the Pages project:
#   cd workers/rs-poster && npx wrangler deploy
#
# Required secrets (set in Cloudflare dashboard → Workers → rs-poster → Settings → Variables):
#   RS_AUTH_INFO      — value of real-auth-info header from RS session
#   RS_GROUP_ID       — numeric ID of the RaxEdge Predictions RS group

name = "raxedge-rs-poster"
main = "index.js"
compatibility_date = "2024-09-23"

[vars]
RS_DEVICE_UUID = "310a20be-9ef8-4ee0-802f-5b1cffb5dd5e"

# ── D1 binding — same database as the Pages project ───
[[d1_databases]]
binding = "DB"
database_name = "edge-db"
database_id = "ff9b93f1-81f8-4370-bd57-f634e0300443"

# ── Cron trigger: every minute ────────────────────────
[triggers]
crons = ["* * * * *"]

# ── Observability ──────────────────────────────────────
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
